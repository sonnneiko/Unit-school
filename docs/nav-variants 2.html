<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Варианты навигации</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f0f0; padding: 40px; display: flex; flex-direction: column; gap: 48px; }
  h2 { font-size: 14px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }

  .slide-mock {
    position: relative;
    width: 900px;
    height: 520px;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 32px rgba(0,0,0,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slide-content {
    text-align: center;
    color: #ccc;
    font-size: 18px;
  }

  /* ── Вариант 1: стрелки по бокам ── */
  .side-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    border: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    font-size: 18px;
    color: #222;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background .15s, box-shadow .15s;
    z-index: 10;
  }
  .side-arrow:hover { background: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.18); }
  .side-arrow:disabled { opacity: 0.25; cursor: default; }
  .side-arrow.left { left: 16px; }
  .side-arrow.right { right: 16px; }

  .slide-counter-overlay {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: rgba(0,0,0,0.35);
    letter-spacing: 0.3px;
  }

  /* ── Вариант 2: панель снизу ── */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    border-top: 1px solid rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
  }

  .bar-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid rgba(0,0,0,0.12);
    font-size: 16px;
    color: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background .15s;
  }
  .bar-btn:hover { background: #f5f5f5; }
  .bar-btn:disabled { opacity: 0.25; cursor: default; }

  .bar-dots { display: flex; gap: 6px; align-items: center; }
  .bar-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ddd;
    transition: all .2s;
  }
  .bar-dot.active { background: #1CA15A; width: 20px; border-radius: 4px; }
  .bar-dot.done { background: #1CA15A; opacity: 0.4; }

  .bar-counter { font-size: 12px; color: #aaa; min-width: 40px; text-align: center; }

  /* ── Вариант 3: тонкая полоска прогресса + hover-стрелки ── */
  .progress-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: rgba(0,0,0,0.06);
  }
  .progress-fill {
    height: 100%;
    width: 40%;
    background: #1CA15A;
    border-radius: 0 2px 2px 0;
    transition: width .3s;
  }

  .hover-zone {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .hover-zone.left { left: 0; }
  .hover-zone.right { right: 0; }
  .hover-zone:hover .hover-arrow { opacity: 1; }

  .hover-arrow {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    border: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    font-size: 18px;
    color: #222;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity .2s;
  }

  .slide-num {
    position: absolute;
    bottom: 16px;
    right: 20px;
    font-size: 12px;
    color: rgba(0,0,0,0.28);
  }
</style>
</head>
<body>

<div>
  <h2>Вариант 1 — стрелки по бокам (всегда видны)</h2>
  <div class="slide-mock">
    <div class="slide-content">содержимое слайда</div>
    <button class="side-arrow left" disabled>←</button>
    <button class="side-arrow right">→</button>
    <div class="slide-counter-overlay">2 / 7</div>
  </div>
</div>

<div>
  <h2>Вариант 2 — панель снизу (тонкая, прозрачная)</h2>
  <div class="slide-mock">
    <div class="slide-content">содержимое слайда</div>
    <div class="bottom-bar">
      <button class="bar-btn" disabled>←</button>
      <div class="bar-dots">
        <div class="bar-dot done"></div>
        <div class="bar-dot active"></div>
        <div class="bar-dot"></div>
        <div class="bar-dot"></div>
        <div class="bar-dot"></div>
        <div class="bar-dot"></div>
        <div class="bar-dot"></div>
      </div>
      <button class="bar-btn">→</button>
    </div>
  </div>
</div>

<div>
  <h2>Вариант 3 — прогресс-полоска сверху + стрелки по hover</h2>
  <div class="slide-mock">
    <div class="slide-content">наведи на края слайда</div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <div class="hover-zone left"><div class="hover-arrow">←</div></div>
    <div class="hover-zone right"><div class="hover-arrow">→</div></div>
    <div class="slide-num">2 / 7</div>
  </div>
</div>

</body>
</html>
